<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기상데이터(from Open-Meteo)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">
  <!-- 상단 헤더 영역 -->
  <header class="p-4 sm:p-6 pb-2">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
      <h1 class="text-2xl font-bold text-white tracking-tight flex items-center">
        <i class="fa-solid fa-cloud-sun-rain mr-3 text-blue-400"></i> 기상데이터(from Open-Meteo)
      </h1>
      <button onclick="window.close()" class="bg-slate-800 border border-slate-700 hover:border-red-500 hover:bg-red-500/20 hover:text-red-400 transition-all duration-300 text-slate-300 px-4 py-2 rounded shadow-lg flex items-center gap-2 text-sm font-medium">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> Dashboard 닫기
      </button>
    </div>
    
    <!-- KMA Alert 스켈레톤 (추후 연동용) -->
    <div id="kma-alert-panel" class="w-full bg-slate-800/80 border-l-4 border-slate-600 p-4 rounded-lg shadow-md flex items-center justify-between mb-6 animate-pulse backdrop-blur-sm relative overflow-hidden">
      <!-- subtle shimmer -->
      <div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-slate-600/10 to-transparent shimmer-effect"></div>
      
      <div class="flex items-center gap-3 w-full">
        <div class="w-8 h-8 rounded-full bg-slate-700 shrink-0"></div>
        <div class="space-y-2 flex-grow max-w-lg">
          <div class="h-4 bg-slate-700 rounded w-[60%]"></div>
          <div class="h-3 bg-slate-700/50 rounded w-[40%]"></div>
        </div>
      </div>
      <div class="hidden sm:block h-6 bg-slate-700 rounded w-24 shrink-0"></div>
    </div>
    
    <!-- 컨트롤 패널 (날짜 선택기 등) -->
    <div class="bg-slate-800/90 backdrop-blur-md p-4 rounded-xl shadow-lg border border-slate-700/50 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
      <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3 w-full md:w-auto">
        <label for="date-range" class="font-medium text-slate-300 text-sm whitespace-nowrap">📅 조회 기간 (최근 7일+):</label>
        <div class="relative w-full sm:w-auto">
          <input type="text" id="date-range" class="bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-2 pl-10 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 w-full sm:w-64 tracking-wider text-sm transition-all shadow-inner" placeholder="날짜 선택...">
          <i class="fa-regular fa-calendar absolute left-3.5 top-2.5 text-slate-400"></i>
        </div>
      </div>
      
      <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-end">
        <div id="loading-indicator" class="flex items-center gap-2 text-blue-400 font-medium text-sm">
          <i class="fa-solid fa-circle-notch fa-spin"></i> 로딩중...
        </div>
        <div id="last-updated" class="text-xs text-slate-400 font-mono bg-slate-900/50 px-3 py-1.5 rounded-full border border-slate-700"></div>
      </div>
    </div>
  </header>

  <!-- 메인 4x4 Grid 영역 -->
  <main class="p-4 sm:p-6 pt-2">
    <div id="weather-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
      <!-- Cards will be dynamically inserted here -->
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
  <script src="./app.js"></script>
  <style>
    .shimmer-effect {
      animation: shimmer 2s infinite linear;
    }
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
  </style>
</body>
</html>
