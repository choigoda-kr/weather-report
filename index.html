<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기상데이터(from Open-Meteo)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css?v=20260414_01">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">
  <!-- 상단 통합 헤더 영역 -->
  <header class="p-4 sm:p-6 pb-2">
    <div class="bg-slate-800/90 backdrop-blur-md p-4 rounded-xl shadow-lg border border-slate-700/50 flex flex-wrap items-center justify-between gap-4">
      <h1 class="text-xl sm:text-2xl font-bold text-white tracking-tight flex items-center whitespace-nowrap">
        <i class="fa-solid fa-cloud-sun-rain mr-3 text-blue-400"></i> 기상데이터(from Open-Meteo)
      </h1>
      
      <div class="flex items-center gap-3 flex-grow md:flex-grow-0 justify-end md:justify-center shrink-0">
        <label for="date-range" class="font-medium text-slate-300 text-sm hidden sm:block whitespace-nowrap">📅 조회 기간:</label>
        <div class="relative w-48 sm:w-60">
          <input type="text" id="date-range" class="bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-2 pl-10 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 w-full text-sm transition-all shadow-inner" placeholder="날짜 선택...">
          <i class="fa-regular fa-calendar absolute left-3.5 top-2.5 text-slate-400"></i>
        </div>
      </div>
      
      <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-end">
        <div id="loading-indicator" class="flex items-center gap-2 text-blue-400 font-medium text-sm">
          <i class="fa-solid fa-circle-notch fa-spin"></i>
          <span class="hidden sm:inline">로딩중...</span>
        </div>
        <div id="last-updated" class="text-xs text-slate-400 font-mono bg-slate-900/50 px-3 py-1.5 rounded-full border border-slate-700 whitespace-nowrap">최종 갱신: -</div>
        <button onclick="window.close()" class="bg-slate-800 hover:bg-red-500/20 hover:text-red-400 transition-all text-slate-300 px-3 py-1.5 rounded shadow flex items-center gap-2 text-sm border border-slate-700 hover:border-red-500">
          <i class="fa-solid fa-xmark"></i> <span class="hidden sm:inline">닫기</span>
        </button>
      </div>
    </div>
  </header>

  <!-- 메인 5x4 Grid 영역 -->
  <main class="p-4 sm:p-6 pt-2 flex-grow">
    <div id="weather-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 sm:gap-6">
      <!-- Cards will be dynamically inserted here -->
    </div>
  </main>

  <!-- 데이터 출처 Footer -->
  <footer class="text-center pb-6 pt-2 text-slate-500 text-xs flex justify-center items-center gap-2">
    <i class="fa-solid fa-circle-info"></i> 데이터 출처: Open-Meteo (기상청 및 글로벌 기상 모델 혼합 적용)
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
  <script src="./app.js?v=20260414_01"></script>
  <style>
    .shimmer-effect {
      animation: shimmer 2s infinite linear;
    }
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
  </style>
</body>
</html>
